<div th:fragment="evaluationForm(interview)" id="evaluation-panel" class="app-card">
    <div class="mb-3">
        <h3 class="app-card-title"><i class="bi bi-file-earmark-check-fill me-2"></i>Submit Evaluation</h3>
        <div class="app-card-subtitle">Complete evaluation form for the candidate</div>
    </div>

    <div th:if="${errorMsg}" th:replace="~{fragments/alert :: appAlert(message=${errorMsg}, type='danger')}"></div>

    <form th:attr="hx-post='/interviews/evaluate/' + ${interview.id}"
          hx-target="#evaluation-panel"
          hx-swap="outerHTML"
          class="needs-validation">

        <!-- Overall Rating -->
        <div class="mb-4">
            <label class="form-label fw-bold text-dark mb-2">Overall Rating (1 - 5 Stars)</label>
            <div class="d-flex gap-3 align-items-center">
                <div class="form-check form-check-inline" th:each="star : ${#numbers.sequence(1, 5)}">
                    <input class="form-check-input" type="radio" name="rating" th:id="'star' + ${star}" th:value="${star}" th:checked="${rating == star}" required>
                    <label class="form-check-label fw-semibold text-charcoal" th:for="'star' + ${star}">
                        <span th:text="${star}"></span> <i class="bi bi-star-fill text-warning"></i>
                    </label>
                </div>
            </div>
        </div>

        <!-- Feedback Comments -->
        <div class="mb-4">
            <label for="feedback" class="form-label fw-bold text-dark">Detailed Feedback Comments</label>
            <textarea class="form-control" id="feedback" name="feedback" rows="6" 
                      placeholder="Write detailed assessment, strengths, weaknesses, and decision justification..." 
                      th:text="${feedback}" required></textarea>
        </div>

        <div class="d-flex justify-content-end gap-2">
            <button type="submit" class="app-btn app-btn-primary">
                <i class="bi bi-send-fill me-1"></i> Submit Evaluation
            </button>
        </div>
    </form>
</div>
