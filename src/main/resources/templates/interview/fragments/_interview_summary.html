<div th:fragment="interviewSummary(interview)" class="app-card mb-4">
    <div class="mb-3 d-flex justify-content-between align-items-center">
        <div>
            <h3 class="app-card-title"><i class="bi bi-info-circle-fill me-2"></i>Interview Schedule Info</h3>
            <div class="app-card-subtitle">Details of this specific interview</div>
        </div>
        <div>
            <span class="app-badge"
                  th:classappend="${interview.status.name() == 'SCHEDULED' ? 'app-badge-info' : 
                                  (interview.status.name() == 'EVALUATED' ? 'app-badge-success' : 'app-badge-secondary')}"
                  th:text="${interview.status}">SCHEDULED</span>
        </div>
    </div>
    <div class="py-1">
        <div class="row mb-2">
            <div class="col-sm-4 fw-semibold text-muted">Interviewer:</div>
            <div class="col-sm-8 fw-bold text-dark" th:text="${interview.interviewer?.fullName ?: 'N/A'}">Nguyen Van Khoa</div>
        </div>
        <div class="row mb-2">
            <div class="col-sm-4 fw-semibold text-muted">Date & Time:</div>
            <div class="col-sm-8 text-dark" 
                 th:text="${(interview.interviewDate != null ? #temporals.format(interview.interviewDate, 'dd/MM/yyyy') : 'N/A') + ' at ' + (interview.interviewTime != null ? interview.interviewTime : 'N/A')}">
                 09/07/2026 at 14:00
            </div>
        </div>
        <div class="row mb-0">
            <div class="col-sm-4 fw-semibold text-muted">Location / Link:</div>
            <div class="col-sm-8 text-charcoal" th:text="${interview.locationOrLink ?: 'N/A'}">Room A</div>
        </div>
    </div>
</div>
