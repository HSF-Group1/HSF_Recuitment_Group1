<div th:fragment="candidateSummary(app)" class="app-card">
    <div class="mb-3">
        <h3 class="app-card-title"><i class="bi bi-person-badge-fill me-2"></i>Candidate Summary</h3>
        <div class="app-card-subtitle">Candidate details and application state</div>
    </div>
    <div class="py-2">
        <div class="row mb-3 align-items-center">
            <div class="col-sm-4 fw-semibold text-muted">Full Name:</div>
            <div class="col-sm-8 fw-bold text-dark" th:text="${app.candidate?.user?.fullName ?: 'N/A'}">Tran Thi Mai</div>
        </div>
        <div class="row mb-3 align-items-center">
            <div class="col-sm-4 fw-semibold text-muted">Position Applied:</div>
            <div class="col-sm-8 fw-bold text-charcoal" th:text="${app.jobPosting?.title ?: 'N/A'}">Java Backend Developer</div>
        </div>
        <div class="row mb-3 align-items-center">
            <div class="col-sm-4 fw-semibold text-muted">Current Status:</div>
            <div class="col-sm-8">
                <span class="app-badge app-badge-warning" th:text="${app.status}">SCREENING</span>
            </div>
        </div>
        <div class="row mb-0 align-items-center" th:if="${app.cvFileUrl != null}">
            <div class="col-sm-4 fw-semibold text-muted">Resume (CV):</div>
            <div class="col-sm-8">
                <a th:href="@{/applications/{id}/cv(id=${app.id})}" class="app-btn app-btn-secondary btn-sm text-decoration-none d-inline-flex align-items-center gap-1">
                    <i class="bi bi-file-earmark-pdf"></i> Download CV
                </a>
            </div>
        </div>
    </div>
</div>
