<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: mainLayout(title='Admin Dashboard', activeMenu='dashboard', content=~{::section})}">
<body>
<section>
  <style>
    .metric-value { font-family: var(--font-mono, monospace); font-size: 2.5rem; font-weight: 500; line-height: 1; margin-bottom: 8px; }
    .metric-label { font-size: 0.85rem; color: var(--gray-text); text-transform: uppercase; letter-spacing: 0.05em; }
    .reveal-on-scroll { opacity: 0; transform: translateY(12px); transition: opacity 600ms cubic-bezier(0.16, 1, 0.3, 1), transform 600ms cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal-on-scroll.is-visible { opacity: 1; transform: translateY(0); }
  </style>
  
  <div class="container py-4 reveal-on-scroll is-visible">
    <div class="mb-4">
      <h1 class="mb-1">System Overview</h1>
      <p class="text-muted">Monitor global platform metrics and system health.</p>
    </div>

    <div class="row g-4">
      <div class="col-md-4">
        <div class="app-card p-4 h-100 d-flex flex-column justify-content-center text-center">
          <div class="metric-value" th:text="${hrManagersCount}">0</div>
          <div class="metric-label">Active HR Managers</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="app-card p-4 h-100 d-flex flex-column justify-content-center text-center">
          <div class="metric-value" th:text="${totalUsers}">0</div>
          <div class="metric-label">Total Users</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="app-card p-4 h-100 d-flex flex-column justify-content-center text-center">
          <div class="metric-value" th:text="${totalJobs}">0</div>
          <div class="metric-label">Total Jobs</div>
        </div>
      </div>
      
      <div class="col-md-8 mt-4">
        <div class="app-card p-4 h-100">
          <h3 class="mb-4" style="font-size: 1.25rem; font-weight: 600;">System Activity</h3>
          <div class="d-flex justify-content-between align-items-end" style="height: 200px; border-bottom: 1px solid var(--gray-border); padding-bottom: 10px;">
             <!-- Placeholder chart for admin dashboard -->
             <div class="d-flex flex-column align-items-center" style="width: 12%;">
                <div style="background: #EAF3FB; width: 100%; height: 180px; border-radius: 4px 4px 0 0;"></div>
                <small class="mt-2 text-muted" style="font-size: 0.75rem;">Mon</small>
             </div>
             <div class="d-flex flex-column align-items-center" style="width: 12%;">
                <div style="background: #EAF3FB; width: 100%; height: 120px; border-radius: 4px 4px 0 0;"></div>
                <small class="mt-2 text-muted" style="font-size: 0.75rem;">Tue</small>
             </div>
             <div class="d-flex flex-column align-items-center" style="width: 12%;">
                <div style="background: #EAF3FB; width: 100%; height: 150px; border-radius: 4px 4px 0 0;"></div>
                <small class="mt-2 text-muted" style="font-size: 0.75rem;">Wed</small>
             </div>
             <div class="d-flex flex-column align-items-center" style="width: 12%;">
                <div style="background: #EAF3FB; width: 100%; height: 100px; border-radius: 4px 4px 0 0;"></div>
                <small class="mt-2 text-muted" style="font-size: 0.75rem;">Thu</small>
             </div>
             <div class="d-flex flex-column align-items-center" style="width: 12%;">
                <div style="background: #EAF3FB; width: 100%; height: 160px; border-radius: 4px 4px 0 0;"></div>
                <small class="mt-2 text-muted" style="font-size: 0.75rem;">Fri</small>
             </div>
             <div class="d-flex flex-column align-items-center" style="width: 12%;">
                <div style="background: #EAF3FB; width: 100%; height: 50px; border-radius: 4px 4px 0 0;"></div>
                <small class="mt-2 text-muted" style="font-size: 0.75rem;">Sat</small>
             </div>
             <div class="d-flex flex-column align-items-center" style="width: 12%;">
                <div style="background: #EAF3FB; width: 100%; height: 70px; border-radius: 4px 4px 0 0;"></div>
                <small class="mt-2 text-muted" style="font-size: 0.75rem;">Sun</small>
             </div>
          </div>
        </div>
      </div>

      <div class="col-md-4 mt-4">
        <div class="app-card p-4 h-100 d-flex flex-column">
          <h3 class="mb-3" style="font-size: 1.25rem; font-weight: 600;">System Actions</h3>
          <div class="d-flex flex-column gap-2 mt-auto">
            <a th:href="@{/manage/jobs}" class="btn btn-charcoal text-start">
              <i class="fa-solid fa-briefcase fa-fw me-2"></i>Manage All Jobs
            </a>
            <a th:href="@{/admin/users}" class="btn btn-quiet text-start" style="border: 1px solid var(--gray-border);">
              <i class="fa-solid fa-users-gear fa-fw me-2"></i>Manage Users
            </a>
            <a th:href="@{/admin/activity-log}" class="btn btn-quiet text-start" style="border: 1px solid var(--gray-border);">
              <i class="fa-solid fa-clock-rotate-left fa-fw me-2"></i>Activity Log
            </a>
            <a th:href="@{/admin/settings}" class="btn btn-quiet text-start" style="border: 1px solid var(--gray-border);">
              <i class="fa-solid fa-gear fa-fw me-2"></i>System Settings
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
