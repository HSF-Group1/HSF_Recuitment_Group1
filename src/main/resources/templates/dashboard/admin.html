<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: mainLayout(title='Admin Dashboard', activeMenu='dashboard', content=~{::section})}">
<body>
<section>
  <style>
    .metric-value { font-family: var(--font-mono, monospace); font-size: 2.5rem; font-weight: 500; line-height: 1; margin-bottom: 8px; }
    .metric-label { font-size: 0.85rem; color: var(--gray-text); text-transform: uppercase; letter-spacing: 0.05em; }
    .reveal-on-scroll { opacity: 0; transform: translateY(12px); transition: opacity 600ms cubic-bezier(0.16, 1, 0.3, 1), transform 600ms cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal-on-scroll.is-visible { opacity: 1; transform: translateY(0); }
    .chart-wrapper { position: relative; height: 260px; }
    .doughnut-wrapper { position: relative; height: 260px; }
    .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
  </style>
  
  <div class="container py-4 reveal-on-scroll is-visible">
    <div class="mb-4 d-flex justify-content-between align-items-end">
      <div>
        <h1 class="mb-1">System Overview</h1>
        <p class="text-muted mb-0">Monitor global platform metrics and system health.</p>
      </div>
      <div>
        <!-- Quick Actions dropdown or buttons could go here, but we'll use pills -->
        <a th:href="@{/admin/settings}" class="btn btn-quiet rounded-pill px-4">
          <i class="fa-solid fa-gear me-2"></i>Settings
        </a>
      </div>
    </div>

    <!-- 1. Four-Pillar Metric Cards -->
    <div class="row g-4 mb-4">
      <div class="col-md-6 col-lg-3">
        <div class="app-card p-4 h-100 d-flex flex-column justify-content-center text-center">
          <div class="metric-value text-primary" th:text="${totalUsers}">0</div>
          <div class="metric-label">Total Users</div>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="app-card p-4 h-100 d-flex flex-column justify-content-center text-center">
          <div class="metric-value text-info" th:text="${hrManagersCount}">0</div>
          <div class="metric-label">Active HR Managers</div>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="app-card p-4 h-100 d-flex flex-column justify-content-center text-center">
          <div class="metric-value text-warning" th:text="${totalJobs}">0</div>
          <div class="metric-label">Total Jobs</div>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="app-card p-4 h-100 d-flex flex-column justify-content-center text-center">
          <div class="metric-value text-success" th:text="${totalApps}">0</div>
          <div class="metric-label">Total Applications</div>
        </div>
      </div>
    </div>

    <!-- 2. Dual Charts Section -->
    <div class="row g-4 mb-4">
      <!-- System Growth (Line Chart) -->
      <div class="col-lg-8">
        <div class="app-card p-4 h-100">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <h3 style="font-size: 1.25rem; font-weight: 600; margin: 0;">Platform Growth (Last 7 Days)</h3>
            <div class="d-flex gap-3" style="font-size: 0.8rem; color: var(--gray-text);">
              <span><span class="legend-dot" style="background:#8b5cf6;"></span>New Users</span>
              <span><span class="legend-dot" style="background:#3b82f6;"></span>New Applications</span>
            </div>
          </div>
          <div class="chart-wrapper">
            <canvas id="growthChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Application Status (Doughnut Chart) -->
      <div class="col-lg-4">
        <div class="app-card p-4 h-100">
          <h3 class="mb-3" style="font-size: 1.25rem; font-weight: 600; text-align: center;">Global Funnel</h3>
          <div class="doughnut-wrapper d-flex justify-content-center align-items-center">
            <canvas id="statusChart"></canvas>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 3. System Actions -->
    <div class="row">
      <div class="col-12">
        <div class="app-card p-4">
          <h3 class="mb-3" style="font-size: 1.25rem; font-weight: 600;">System Management</h3>
          <div class="d-flex flex-wrap gap-3">
            <a th:href="@{/manage/jobs}" class="btn btn-charcoal">
              <i class="fa-solid fa-briefcase fa-fw me-2"></i>Manage All Jobs
            </a>
            <a th:href="@{/admin/users}" class="btn btn-quiet" style="border: 1px solid var(--gray-border);">
              <i class="fa-solid fa-users-gear fa-fw me-2"></i>Manage Users
            </a>
            <a th:href="@{/admin/activity-log}" class="btn btn-quiet text-start" style="border: 1px solid var(--gray-border);">
              <i class="fa-solid fa-clock-rotate-left fa-fw me-2"></i>Activity Log
            </a>
            <a th:href="@{/admin/settings}" class="btn btn-quiet text-start" style="border: 1px solid var(--gray-border);">
              <i class="fa-solid fa-gear fa-fw me-2"></i>System Settings
            </a>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Hidden data carriers for Thymeleaf -->
  <div id="admin-chart-data"
       th:attr="data-labels=${activityLabels},data-apps=${activityAppCounts},data-users=${activityUserCounts},data-status=${statusData}"
       style="display:none;"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script>
    (function () {
      const el     = document.getElementById('admin-chart-data');
      const labels = JSON.parse(el.dataset.labels);
      const apps   = JSON.parse(el.dataset.apps);
      const users  = JSON.parse(el.dataset.users);
      const statusData = JSON.parse(el.dataset.status);

      const isDark    = document.documentElement.getAttribute('data-bs-theme') === 'dark';
      const tickColor = isDark ? '#94A3B8' : '#6B7280';
      const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';

      // 1. Line Chart (Growth)
      const growthCtx = document.getElementById('growthChart').getContext('2d');
      new Chart(growthCtx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'New Users',
              data: users,
              borderColor: '#8b5cf6', // purple
              backgroundColor: 'rgba(139, 92, 246, 0.1)',
              borderWidth: 3,
              tension: 0.4,
              fill: true,
              pointBackgroundColor: '#8b5cf6',
              pointBorderColor: isDark ? '#1e293b' : '#ffffff',
              pointBorderWidth: 2,
              pointRadius: 4,
              pointHoverRadius: 6
            },
            {
              label: 'New Applications',
              data: apps,
              borderColor: '#3b82f6', // blue
              backgroundColor: 'rgba(59, 130, 246, 0.1)',
              borderWidth: 3,
              tension: 0.4,
              fill: true,
              pointBackgroundColor: '#3b82f6',
              pointBorderColor: isDark ? '#1e293b' : '#ffffff',
              pointBorderWidth: 2,
              pointRadius: 4,
              pointHoverRadius: 6
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: isDark ? 'rgba(15, 23, 42, 0.9)' : 'rgba(255, 255, 255, 0.9)',
              titleColor: isDark ? '#f8fafc' : '#0f172a',
              bodyColor: isDark ? '#cbd5e1' : '#334155',
              borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)',
              borderWidth: 1,
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: tickColor, font: { size: 12 } }
            },
            y: {
              beginAtZero: true,
              grid: { color: gridColor, drawBorder: false },
              ticks: { color: tickColor, font: { size: 12 }, precision: 0 }
            }
          }
        }
      });

      // 2. Doughnut Chart (Application Status)
      const statusCtx = document.getElementById('statusChart').getContext('2d');
      new Chart(statusCtx, {
        type: 'doughnut',
        data: {
          labels: ['Applied', 'Screening', 'Interview', 'Offer', 'Rejected'],
          datasets: [{
            data: statusData,
            backgroundColor: [
              '#3b82f6', // blue
              '#f59e0b', // amber
              '#10b981', // green
              '#8b5cf6', // purple
              '#ef4444'  // red
            ],
            borderWidth: 2,
            borderColor: isDark ? '#1e293b' : '#ffffff',
            hoverOffset: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '70%',
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                color: tickColor,
                usePointStyle: true,
                padding: 15,
                font: { size: 11 }
              }
            },
            tooltip: {
              backgroundColor: isDark ? 'rgba(15, 23, 42, 0.9)' : 'rgba(255, 255, 255, 0.9)',
              titleColor: isDark ? '#f8fafc' : '#0f172a',
              bodyColor: isDark ? '#cbd5e1' : '#334155',
              borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)',
              borderWidth: 1,
            }
          }
        }
      });

    })();
  </script>
</section>
</body>
</html>
