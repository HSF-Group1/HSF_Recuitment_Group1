<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: mainLayout(title='HR Dashboard', activeMenu='dashboard', content=~{::section})}"
      th:with="pageTitle='Recruitment Overview', pageSubtitle='Monitor live job positions and candidate pipeline.'">
<body>
<section>
  <style>
    .metric-value { font-family: var(--font-mono, monospace); font-size: 2.5rem; font-weight: 500; line-height: 1; margin-bottom: 8px; }
    .metric-label { font-size: 0.85rem; color: var(--gray-text); text-transform: uppercase; letter-spacing: 0.05em; }
    .reveal-on-scroll { opacity: 0; transform: translateY(12px); transition: opacity 600ms cubic-bezier(0.16, 1, 0.3, 1), transform 600ms cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal-on-scroll.is-visible { opacity: 1; transform: translateY(0); }
    .chart-wrapper { position: relative; height: 200px; }
    .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
  </style>
  <div class="container py-4 reveal-on-scroll is-visible">
    <!-- KPI Metrics Grid -->
    <div class="row g-4">
      <!-- Metric cards -->
      <div class="col-md-4">
        <div class="app-card p-4 h-100 d-flex flex-column justify-content-center text-center">
          <div class="metric-value" th:text="${activeJobs}">0</div>
          <div class="metric-label">Active Jobs</div>
        </div>
      </div>
      <!-- New Applications -->
      <div class="col-12 col-md-6 col-lg-4">
        <div class="app-card kpi-card p-4 h-100 d-flex flex-column justify-content-between">
          <div class="kpi-card-icon">
            <i class="fa-solid fa-file-signature text-muted"></i>
          </div>
          <div>
            <div class="kpi-title text-muted text-uppercase mb-1" style="font-size: 0.72rem; letter-spacing: 0.05em; font-weight: 600;">New Applications</div>
            <div class="kpi-value my-2" th:text="${newApps}" style="font-size: 2.25rem; font-weight: 700; line-height: 1;">0</div>
          </div>
          <div class="kpi-desc text-muted" style="font-size: 0.85rem;">Unreviewed applicant submissions</div>
        </div>
      </div>
      <!-- Interviews Today -->
      <div class="col-12 col-md-6 col-lg-4">
        <div class="app-card kpi-card p-4 h-100 d-flex flex-column justify-content-between">
          <div class="kpi-card-icon">
            <i class="fa-solid fa-calendar-day text-muted"></i>
          </div>
          <div>
            <div class="kpi-title text-muted text-uppercase mb-1" style="font-size: 0.72rem; letter-spacing: 0.05em; font-weight: 600;">Interviews Today</div>
            <div class="kpi-value my-2" th:text="${interviewsToday}" style="font-size: 2.25rem; font-weight: 700; line-height: 1;">0</div>
          </div>
          <div class="kpi-desc text-muted" style="font-size: 0.85rem;">Scheduled candidate evaluations for today</div>
        </div>
      </div>

      <!-- Grouped bar chart: applications + interviews per day -->
      <div class="col-md-8 mt-4">
        <div class="app-card p-4 h-100">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <h3 style="font-size: 1.25rem; font-weight: 600; margin: 0;">Activity — Last 7 Days</h3>
            <div class="d-flex gap-3" style="font-size: 0.8rem; color: var(--gray-text);">
              <span><span class="legend-dot" style="background:rgba(59,130,246,0.75);"></span>Applications</span>
              <span><span class="legend-dot" style="background:rgba(34,197,94,0.75);"></span>Interviews</span>
            </div>
          </div>
          <div class="chart-wrapper">
            <canvas id="hrActivityChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="col-md-4 mt-4">
        <div class="app-card p-4 h-100 d-flex flex-column">
          <h3 class="mb-4" style="font-size: 1.15rem; font-weight: 600;">Quick Actions</h3>
          <div class="quick-actions-grid mt-auto">
            <a th:href="@{/manage/jobs/new}" class="quick-action-card">
              <div class="quick-action-icon">
                <i class="fa-solid fa-circle-plus"></i>
              </div>
              <div>
                <div class="quick-action-title">Post New Job</div>
                <div class="quick-action-desc">Publish a new job position</div>
              </div>
            </a>
            <a th:href="@{/reports/pipeline}" class="btn btn-quiet text-start" style="border: 1px solid var(--gray-border);">
              <i class="fa-solid fa-chart-column fa-fw me-2"></i>View Full Report
            </a>
            <a th:href="@{/manage/jobs}" class="quick-action-card">
              <div class="quick-action-icon">
                <i class="fa-solid fa-briefcase"></i>
              </div>
              <div>
                <div class="quick-action-title">Manage Jobs</div>
                <div class="quick-action-desc">Track and edit current jobs</div>
              </div>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Data carrier to avoid th:inline="javascript" rendering issues -->
  <div id="hr-chart-data"
       th:attr="data-labels=${chartLabels},data-apps=${chartAppCounts},data-ivs=${chartIvCounts}"
       style="display:none;"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script>
    (function () {
      const el     = document.getElementById('hr-chart-data');
      const labels = JSON.parse(el.dataset.labels);
      const apps   = JSON.parse(el.dataset.apps);
      const ivs    = JSON.parse(el.dataset.ivs);

      const isDark    = document.documentElement.getAttribute('data-bs-theme') === 'dark';
      const tickColor = isDark ? '#94A3B8' : '#6B7280';
      const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';

      const ctx = document.getElementById('hrActivityChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'New Applications',
              data: apps,
              backgroundColor: isDark ? 'rgba(59,130,246,0.45)' : 'rgba(59,130,246,0.30)',
              borderColor:     isDark ? 'rgba(96,165,250,0.9)'  : 'rgba(37,99,235,0.75)',
              borderWidth: 2,
              borderRadius: 4,
              borderSkipped: false,
            },
            {
              label: 'Interviews',
              data: ivs,
              backgroundColor: isDark ? 'rgba(34,197,94,0.45)' : 'rgba(34,197,94,0.30)',
              borderColor:     isDark ? 'rgba(74,222,128,0.9)' : 'rgba(22,163,74,0.75)',
              borderWidth: 2,
              borderRadius: 4,
              borderSkipped: false,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },   // we render our own legend above
            tooltip: {
              mode: 'index',
              intersect: false,
            }
          },
          scales: {
            x: {
              grid: { color: gridColor },
              ticks: { color: tickColor, font: { size: 12 } }
            },
            y: {
              beginAtZero: true,
              grid: { color: gridColor },
              ticks: { color: tickColor, font: { size: 12 }, precision: 0 }
            }
          }
        }
      });
    })();
  </script>
</section>
</body>
</html>
