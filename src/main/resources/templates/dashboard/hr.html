<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: mainLayout(title='HR Dashboard', activeMenu='dashboard', content=~{::section})}">
<body>
<section>
  <style>
    .metric-value { font-family: var(--font-mono, monospace); font-size: 2.5rem; font-weight: 500; line-height: 1; margin-bottom: 8px; }
    .metric-label { font-size: 0.85rem; color: var(--gray-text); text-transform: uppercase; letter-spacing: 0.05em; }
    .reveal-on-scroll { opacity: 0; transform: translateY(12px); transition: opacity 600ms cubic-bezier(0.16, 1, 0.3, 1), transform 600ms cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal-on-scroll.is-visible { opacity: 1; transform: translateY(0); }
  </style>
  
  <div class="container py-4 reveal-on-scroll is-visible">
    <div class="mb-4">
      <h1 class="mb-1">Recruitment Overview</h1>
      <p class="text-muted">Monitor live job positions and candidate pipeline.</p>
    </div>

    <div class="row g-4">
      <div class="col-md-4">
        <div class="app-card p-4 h-100 d-flex flex-column justify-content-center text-center">
          <div class="metric-value" th:text="${activeJobs}">0</div>
          <div class="metric-label">Active Jobs</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="app-card p-4 h-100 d-flex flex-column justify-content-center text-center">
          <div class="metric-value" th:text="${newApps}">0</div>
          <div class="metric-label">New Applications</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="app-card p-4 h-100 d-flex flex-column justify-content-center text-center">
          <div class="metric-value" th:text="${interviewsToday}">0</div>
          <div class="metric-label">Interviews Today</div>
        </div>
      </div>
      
      <div class="col-md-8 mt-4">
        <div class="app-card p-4 h-100">
          <h3 class="mb-4" style="font-size: 1.25rem; font-weight: 600;">Pipeline Status</h3>
          <div class="d-flex justify-content-between align-items-end" style="height: 200px; border-bottom: 1px solid var(--gray-border); padding-bottom: 10px;">
             <div class="d-flex flex-column align-items-center" style="width: 18%;">
                <div style="background: #FDEBEC; width: 100%; height: 180px; border-radius: 4px 4px 0 0;"></div>
                <small class="mt-2 text-muted" style="font-size: 0.75rem;">Applied</small>
             </div>
             <div class="d-flex flex-column align-items-center" style="width: 18%;">
                <div style="background: #FBF3DB; width: 100%; height: 120px; border-radius: 4px 4px 0 0;"></div>
                <small class="mt-2 text-muted" style="font-size: 0.75rem;">Screening</small>
             </div>
             <div class="d-flex flex-column align-items-center" style="width: 18%;">
                <div style="background: #E1F3FE; width: 100%; height: 80px; border-radius: 4px 4px 0 0;"></div>
                <small class="mt-2 text-muted" style="font-size: 0.75rem;">Interview</small>
             </div>
             <div class="d-flex flex-column align-items-center" style="width: 18%;">
                <div style="background: #EDF3EC; width: 100%; height: 40px; border-radius: 4px 4px 0 0;"></div>
                <small class="mt-2 text-muted" style="font-size: 0.75rem;">Offered</small>
             </div>
             <div class="d-flex flex-column align-items-center" style="width: 18%;">
                <div style="background: #FDEBEC; width: 100%; height: 15px; border-radius: 4px 4px 0 0;"></div>
                <small class="mt-2 text-muted" style="font-size: 0.75rem;">Rejected</small>
             </div>
          </div>
        </div>
      </div>

      <div class="col-md-4 mt-4">
        <div class="app-card p-4 h-100 d-flex flex-column">
          <h3 class="mb-3" style="font-size: 1.25rem; font-weight: 600;">Quick Actions</h3>
          <div class="d-flex flex-column gap-2 mt-auto">
            <a th:href="@{/manage/jobs/new}" class="btn btn-charcoal text-start">
              <i class="fa-solid fa-circle-plus fa-fw me-2"></i>Post New Job
            </a>
            <a th:href="@{/hr/reports/pipeline}" class="btn btn-quiet text-start" style="border: 1px solid var(--gray-border);">
              <i class="fa-solid fa-chart-column fa-fw me-2"></i>View Full Report
            </a>
            <a th:href="@{/manage/jobs}" class="btn btn-quiet text-start" style="border: 1px solid var(--gray-border);">
              <i class="fa-solid fa-briefcase fa-fw me-2"></i>Manage Jobs
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
