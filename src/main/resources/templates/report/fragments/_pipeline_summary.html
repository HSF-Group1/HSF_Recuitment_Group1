<div th:fragment="pipelineSummary(summary)" class="row g-3">
    <!-- Applied -->
    <div class="col-md-3 col-sm-6">
        <div class="card border-0 shadow-sm rounded-3 p-3 bg-light">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <div class="text-uppercase text-muted fw-bold small">Applied</div>
                    <div class="fs-3 fw-bold text-dark mt-1" th:text="${summary.get(T(com.group1.recruitment.enums.ApplicationStatus).APPLIED) ?: 0}">0</div>
                </div>
                <div class="fs-2 text-primary"><i class="bi bi-file-earmark-person-fill"></i></div>
            </div>
        </div>
    </div>
    <!-- Screening -->
    <div class="col-md-3 col-sm-6">
        <div class="card border-0 shadow-sm rounded-3 p-3 bg-light">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <div class="text-uppercase text-muted fw-bold small">Screening</div>
                    <div class="fs-3 fw-bold text-dark mt-1" th:text="${summary.get(T(com.group1.recruitment.enums.ApplicationStatus).SCREENING) ?: 0}">0</div>
                </div>
                <div class="fs-2 text-warning"><i class="bi bi-search"></i></div>
            </div>
        </div>
    </div>
    <!-- Interview -->
    <div class="col-md-3 col-sm-6">
        <div class="card border-0 shadow-sm rounded-3 p-3 bg-light">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <div class="text-uppercase text-muted fw-bold small">Interview</div>
                    <div class="fs-3 fw-bold text-dark mt-1" th:text="${summary.get(T(com.group1.recruitment.enums.ApplicationStatus).INTERVIEW) ?: 0}">0</div>
                </div>
                <div class="fs-2 text-info"><i class="bi bi-people-fill"></i></div>
            </div>
        </div>
    </div>
    <!-- Offer -->
    <div class="col-md-3 col-sm-6">
        <div class="card border-0 shadow-sm rounded-3 p-3 bg-light">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <div class="text-uppercase text-muted fw-bold small">Offer</div>
                    <div class="fs-3 fw-bold text-dark mt-1" th:text="${summary.get(T(com.group1.recruitment.enums.ApplicationStatus).OFFER) ?: 0}">0</div>
                </div>
                <div class="fs-2 text-success"><i class="bi bi-envelope-open-fill"></i></div>
            </div>
        </div>
    </div>
    <!-- Hired -->
    <div class="col-md-3 col-sm-6">
        <div class="card border-0 shadow-sm rounded-3 p-3 bg-light">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <div class="text-uppercase text-muted fw-bold small">Hired</div>
                    <div class="fs-3 fw-bold text-dark mt-1" th:text="${summary.get(T(com.group1.recruitment.enums.ApplicationStatus).HIRED) ?: 0}">0</div>
                </div>
                <div class="fs-2 text-success"><i class="bi bi-check-circle-fill"></i></div>
            </div>
        </div>
    </div>
    <!-- Rejected -->
    <div class="col-md-3 col-sm-6">
        <div class="card border-0 shadow-sm rounded-3 p-3 bg-light">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <div class="text-uppercase text-muted fw-bold small">Rejected</div>
                    <div class="fs-3 fw-bold text-dark mt-1" th:text="${summary.get(T(com.group1.recruitment.enums.ApplicationStatus).REJECTED) ?: 0}">0</div>
                </div>
                <div class="fs-2 text-danger"><i class="bi bi-x-circle-fill"></i></div>
            </div>
        </div>
    </div>
    <!-- Withdrawn -->
    <div class="col-md-3 col-sm-6">
        <div class="card border-0 shadow-sm rounded-3 p-3 bg-light">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <div class="text-uppercase text-muted fw-bold small">Withdrawn</div>
                    <div class="fs-3 fw-bold text-dark mt-1" th:text="${summary.get(T(com.group1.recruitment.enums.ApplicationStatus).WITHDRAWN) ?: 0}">0</div>
                </div>
                <div class="fs-2 text-secondary"><i class="bi bi-dash-circle-fill"></i></div>
            </div>
        </div>
    </div>
</div>
