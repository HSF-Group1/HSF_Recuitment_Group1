<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: mainLayout(title='Recruitment Pipeline Report', activeMenu = 'report', content=~{::section})}">
<body>
<section class="container py-4">
    <!-- Breadcrumb -->
    <div th:replace="~{fragments/breadcrumb :: appBreadcrumb(parentText='Dashboard', parentUrl='/', activeText='Pipeline Report')}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="app-h1 mb-1">Recruitment Pipeline Report</h1>
            <div class="text-muted">Track the recruitment pipeline progress and candidate stages</div>
        </div>
    </div>

    <!-- Job Filter Card -->
    <div class="app-card mb-4">
        <div th:replace="~{report/fragments/_job_selector :: jobSelector(${jobs}, ${selectedJobId})}"></div>
    </div>

    <!-- Data Dashboard Wrapper -->
    <div id="pipeline-data-container">
        <div th:replace="~{report/fragments/_pipeline_data :: pipelineData(${summary}, ${applications}, ${reportService})}"></div>
    </div>
</section>
</body>
</html>
