<!DOCTYPE html>
<!-- SCR-02: Password Reset — request step -->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/auth :: authLayout(title='Password Reset', content=~{::section})}">
<body>
<section>
  <h1 class="mb-1" style="font-size: 1.5rem;">Reset your password</h1>
  <p class="text-muted mb-4" style="font-size: var(--small-size);">
    Enter your account email and we will send you a reset link.
  </p>

  <div th:if="${submitted}">
    <div class="alert alert-success d-flex align-items-start gap-2">
      <i class="fa-solid fa-circle-check fa-fw mt-1"></i>
      <span>
        If an account exists for that email, a reset link has been sent.
        The link expires in <span th:text="${ttlMinutes}">30</span> minutes.
      </span>
    </div>

    <!-- No SMTP is configured in this assignment, so the "email" is simulated
         on screen. Remove this block once a real mail sender is wired up. -->
    <div class="alert alert-info" th:if="${demoResetLink != null}">
      <div class="d-flex align-items-center gap-2 mb-2">
        <i class="fa-solid fa-envelope-open-text fa-fw"></i>
        <strong>Simulated email</strong>
        <span class="text-muted" style="font-size: 0.78rem;">(demo &mdash; no SMTP configured)</span>
      </div>
      <a th:href="${demoResetLink}" th:text="${demoResetLink}"
         style="font-size: 0.8rem; word-break: break-all;">reset link</a>
    </div>
  </div>

  <form th:action="@{/auth/forgot-password}" th:object="${forgotPasswordForm}" method="post" novalidate
        th:unless="${submitted}">
    <div class="mb-4">
      <label for="email" class="app-form-label">Email</label>
      <input type="email" id="email" class="app-form-control" th:field="*{email}"
             th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'"
             autocomplete="email" autofocus>
      <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error</span>
    </div>

    <button type="submit" class="btn btn-charcoal w-100">
      <i class="fa-solid fa-paper-plane fa-fw me-2"></i>Send Reset Link
    </button>
  </form>

  <hr class="my-4">
  <p class="text-center mb-0" style="font-size: var(--small-size);">
    <a th:href="@{/auth/login}"><i class="fa-solid fa-arrow-left fa-fw me-1"></i>Back to sign in</a>
  </p>
</section>
</body>
</html>
