<!DOCTYPE html>
<!-- SCR-02: Password Reset — confirmation step (token from the emailed link) -->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/auth :: authLayout(title='Choose New Password', content=~{::section})}">
<body>
<section>
  <h1 class="mb-1" style="font-size: 1.5rem;">Choose a new password</h1>
  <p class="text-muted mb-4" style="font-size: var(--small-size);">
    Set a new password for your account.
  </p>

  <div th:if="${invalidToken}">
    <div class="alert alert-danger d-flex align-items-start gap-2">
      <i class="fa-solid fa-circle-exclamation fa-fw mt-1"></i>
      <span>This reset link is invalid or has expired. Reset links are single-use and expire after 30 minutes.</span>
    </div>
    <a th:href="@{/auth/forgot-password}" class="btn btn-charcoal w-100">
      <i class="fa-solid fa-rotate-right fa-fw me-2"></i>Request a New Link
    </a>
  </div>

  <form th:action="@{/auth/reset-password}" th:object="${resetPasswordForm}" method="post" novalidate
        th:unless="${invalidToken}">
    <input type="hidden" th:field="*{token}">

    <div class="mb-3">
      <label for="newPassword" class="app-form-label">New password</label>
      <div class="pw-group">
        <input type="password" id="newPassword" class="app-form-control" th:field="*{newPassword}"
               th:classappend="${#fields.hasErrors('newPassword')} ? ' is-invalid'"
               autocomplete="new-password" autofocus>
        <button type="button" class="pw-toggle" onclick="togglePw(this)" aria-label="Show password">
          <i class="fa-solid fa-eye fa-fw"></i>
        </button>
      </div>
      <span class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}">Error</span>
      <span class="text-muted d-block mt-1" style="font-size: 0.78rem;"
            th:unless="${#fields.hasErrors('newPassword')}">
        At least 8 characters, with an uppercase letter and a digit.
      </span>
    </div>

    <div class="mb-4">
      <label for="confirmPassword" class="app-form-label">Confirm new password</label>
      <div class="pw-group">
        <input type="password" id="confirmPassword" class="app-form-control" th:field="*{confirmPassword}"
               th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid'"
               autocomplete="new-password">
        <button type="button" class="pw-toggle" onclick="togglePw(this)" aria-label="Show password">
          <i class="fa-solid fa-eye fa-fw"></i>
        </button>
      </div>
      <span class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Error</span>
    </div>

    <button type="submit" class="btn btn-charcoal w-100">
      <i class="fa-solid fa-key fa-fw me-2"></i>Reset Password
    </button>
  </form>

  <hr class="my-4">
  <p class="text-center mb-0" style="font-size: var(--small-size);">
    <a th:href="@{/auth/login}"><i class="fa-solid fa-arrow-left fa-fw me-1"></i>Back to sign in</a>
  </p>
</section>
</body>
</html>
