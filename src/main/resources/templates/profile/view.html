<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app :: appLayout('User Profile', ~{::section})}">
<body>
<section>
  <h1 class="mb-4">User Profile</h1>

  <div class="card" style="max-width: 640px;">
    <div class="card-body p-4">
      <div class="mb-3">
        <div class="text-muted small">Full name</div>
        <div class="fw-semibold" th:text="${user != null ? user.fullName : '—'}">Full name</div>
      </div>
      <div class="mb-3">
        <div class="text-muted small">Username</div>
        <div class="fw-semibold" th:text="${user != null ? user.username : '—'}">username</div>
        <div class="form-text">Username cannot be changed.</div>
      </div>
      <div class="mb-3">
        <div class="text-muted small">Email</div>
        <div class="fw-semibold" th:text="${user != null ? user.email : '—'}">email</div>
      </div>
      <div class="mb-3">
        <div class="text-muted small">Role</div>
        <span class="app-badge app-badge-info" th:text="${currentUser.roleLabel()}">Role</span>
      </div>
      <div class="mb-3">
        <div class="text-muted small">Member since</div>
        <div th:text="${user != null and user.createdAt != null ? #temporals.format(user.createdAt, 'yyyy-MM-dd') : '—'}">date</div>
      </div>
      <hr>
      <div class="d-flex flex-wrap gap-2">
        <a th:href="@{/profile/change-password}" class="btn btn-quiet">
          <i class="fa-solid fa-key me-1"></i>Change Password
        </a>
        <form th:action="@{/logout}" method="post">
          <button type="submit" class="btn btn-danger">
            <i class="fa-solid fa-right-from-bracket me-1"></i>Sign Out
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
</body>
</html>
