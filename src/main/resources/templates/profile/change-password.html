<!DOCTYPE html>
<!-- SCR-05: Password Change -->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="${currentUser.isHrOrAdmin()} ? ~{layout/base :: mainLayout(title='Change Password', activeMenu='profile', content=~{::section})} : ~{layout/member :: memberLayout(title='Change Password', content=~{::section})}">
<body>
<section class="container" style="max-width: 720px; margin: 0 auto;">
  <p class="mb-3" style="font-size: var(--small-size);">
    <a th:href="@{/profile}"><i class="fa-solid fa-arrow-left fa-fw me-1"></i>Profile</a>
  </p>

  <h1 class="mb-1">Change password</h1>
  <p class="text-muted mb-4">Verify your current password, then choose a new one.</p>

  <div class="app-card p-4" style="max-width: 520px;">
    <form th:action="@{/profile/change-password}" th:object="${changePasswordForm}" method="post" novalidate>
      <div class="mb-3">
        <label for="currentPassword" class="app-form-label">Current password</label>
        <div class="pw-group">
          <input type="password" id="currentPassword" class="app-form-control" th:field="*{currentPassword}"
                 th:classappend="${#fields.hasErrors('currentPassword')} ? ' is-invalid'"
                 autocomplete="current-password" autofocus>
          <button type="button" class="pw-toggle" onclick="togglePw(this)" aria-label="Show password">
            <i class="fa-solid fa-eye fa-fw"></i>
          </button>
        </div>
        <span class="field-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}">Error</span>
      </div>

      <div class="mb-3">
        <label for="newPassword" class="app-form-label">New password</label>
        <div class="pw-group">
          <input type="password" id="newPassword" class="app-form-control" th:field="*{newPassword}"
                 th:classappend="${#fields.hasErrors('newPassword')} ? ' is-invalid'"
                 autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw(this)" aria-label="Show password">
            <i class="fa-solid fa-eye fa-fw"></i>
          </button>
        </div>
        <span class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}">Error</span>
        <span class="text-muted d-block mt-1" style="font-size: 0.78rem;"
              th:unless="${#fields.hasErrors('newPassword')}">
          At least 8 characters, with an uppercase letter and a digit.
        </span>
      </div>

      <div class="mb-4">
        <label for="confirmPassword" class="app-form-label">Confirm new password</label>
        <div class="pw-group">
          <input type="password" id="confirmPassword" class="app-form-control" th:field="*{confirmPassword}"
                 th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid'"
                 autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw(this)" aria-label="Show password">
            <i class="fa-solid fa-eye fa-fw"></i>
          </button>
        </div>
        <span class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Error</span>
      </div>

      <div class="d-flex flex-wrap gap-2">
        <button type="submit" class="btn btn-charcoal">
          <i class="fa-solid fa-key fa-fw me-2"></i>Update Password
        </button>
        <a th:href="@{/profile}" class="btn btn-quiet">Cancel</a>
      </div>
    </form>
  </div>
</section>
</body>
</html>
