<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app :: appLayout('Change Password', ~{::section})}">
<body>
<section>
  <a th:href="@{/profile}" class="d-inline-block mb-2">&larr; Profile</a>
  <h1 class="mb-4">Change Password</h1>

  <div class="card" style="max-width: 520px;">
    <div class="card-body p-4">
      <form th:action="@{/profile/change-password}" method="post">
        <div class="mb-3">
          <label class="form-label">Current password</label>
          <input type="password" name="currentPassword" class="form-control" required autofocus>
          <div class="text-danger small" th:if="${errors != null and errors.currentPassword}" th:text="${errors.currentPassword}"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">New password</label>
          <input type="password" name="newPassword" class="form-control" required>
          <div class="form-text">At least 8 characters, including 1 uppercase letter and 1 number.</div>
          <div class="text-danger small" th:if="${errors != null and errors.newPassword}" th:text="${errors.newPassword}"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm new password</label>
          <input type="password" name="confirmPassword" class="form-control" required>
          <div class="text-danger small" th:if="${errors != null and errors.confirmPassword}" th:text="${errors.confirmPassword}"></div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-charcoal">Change Password</button>
          <a th:href="@{/profile}" class="btn btn-quiet">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</section>
</body>
</html>
