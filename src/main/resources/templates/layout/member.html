<!DOCTYPE html>
<!-- Signed-in shell for the profile screens (SCR-04/05).
     Top navbar with serif brand, role badge, theme toggle and the username
     dropdown (Profile / Change Password / Sign Out). Follows ui-skill.md. -->
<html xmlns:th="http://www.thymeleaf.org" th:fragment="memberLayout(title, content)">
<head>
  <!-- Anti-flash theme bootstrap — MUST run before any asset streams (ui-skill.md §9) -->
  <script>
    (function () {
      var cachedTheme = 'light';
      try { cachedTheme = localStorage.getItem('theme') || 'light'; } catch (e) { }
      document.documentElement.setAttribute('data-bs-theme', cachedTheme);
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title != null ? title + ' - TalentHub' : 'TalentHub'}">TalentHub</title>

  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Font Awesome 6 (solid weights only, ui-skill.md §5) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- Design tokens + components, then the editorial skin, then dark mode -->
  <link th:href="@{/css/base/variables.css}" rel="stylesheet">
  <link th:href="@{/css/base/reset.css}" rel="stylesheet">
  <link th:href="@{/css/layout/navbar.css}" rel="stylesheet">
  <link th:href="@{/css/components/button.css}" rel="stylesheet">
  <link th:href="@{/css/components/form.css}" rel="stylesheet">
  <link th:href="@{/css/components/card.css}" rel="stylesheet">
  <link th:href="@{/css/components/badge.css}" rel="stylesheet">
  <link th:href="@{/css/components/alert.css}" rel="stylesheet">
  <link th:href="@{/css/base/editorial.css}" rel="stylesheet">
  <link th:href="@{/css/base/dark.css}" rel="stylesheet">

  <style>
    /* Structural fail-safes for this shell (ui-skill.md §8) */
    .member-frame {
      min-height: 100dvh; /* never vh-100 (§6) */
      display: flex;
      flex-direction: column;
    }
    .member-main { flex: 1; padding: 40px 16px; }
    .member-shell { max-width: 720px; margin: 0 auto; }
    .app-navbar-brand {
      font-family: var(--font-serif);
      letter-spacing: -0.02em;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .nav-user-btn {
      background: transparent;
      border: 1px solid var(--gray-border);
      border-radius: 4px;
      color: var(--ink);
      padding: 6px 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: var(--small-size);
      cursor: pointer;
    }
    .nav-user-btn:hover { border-color: rgba(0, 0, 0, 0.14); }
    [data-bs-theme="dark"] .nav-user-btn { border-color: #232B45; color: #E2E8F0; }

    /* Validation states — skeleton form.css has none */
    .app-form-control.is-invalid { border-color: #A63A3A; }
    .field-error { display: block; color: #A63A3A; font-size: 0.82rem; margin-top: 4px; }
    [data-bs-theme="dark"] .field-error { color: #E8A6A6; }

    /* Password reveal button sits inside the input row */
    .pw-group { position: relative; }
    .pw-group .app-form-control { padding-right: 46px; }
    .pw-toggle {
      position: absolute; top: 0; right: 0; height: 100%; width: 44px;
      background: transparent; border: 0; color: var(--gray-text); cursor: pointer;
    }
    .pw-toggle:hover { color: var(--ink); }
    [data-bs-theme="dark"] .pw-toggle:hover { color: #F1F5F9; }
  </style>
</head>

<body>
<div class="member-frame">

  <nav class="app-navbar">
    <a th:href="@{/profile}" class="app-navbar-brand">
      <i class="fa-solid fa-briefcase fa-fw"></i><span>TalentHub</span>
    </a>

    <div class="d-flex align-items-center gap-3">
      <button type="button" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
        <i class="fa-solid fa-moon fa-fw" data-theme-icon=""></i>
      </button>

      <span class="app-badge app-badge-secondary d-none d-sm-inline-flex"
            th:if="${currentUser != null}" th:text="${currentUser.roleLabel}">Candidate</span>

      <div class="dropdown" th:if="${currentUser != null}">
        <button class="nav-user-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="fa-solid fa-circle-user fa-fw"></i>
          <span th:text="${currentUser.username}">username</span>
          <i class="fa-solid fa-chevron-down fa-sm"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><h6 class="dropdown-header" th:text="${currentUser.fullName}">Full Name</h6></li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <a class="dropdown-item" th:href="@{/profile}">
              <i class="fa-solid fa-user fa-fw me-2"></i>Profile
            </a>
          </li>
          <li>
            <a class="dropdown-item" th:href="@{/profile/change-password}">
              <i class="fa-solid fa-key fa-fw me-2"></i>Change Password
            </a>
          </li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <form th:action="@{/auth/logout}" method="post" class="m-0">
              <button type="submit" class="dropdown-item">
                <i class="fa-solid fa-arrow-right-from-bracket fa-fw me-2"></i>Sign Out
              </button>
            </form>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="member-main">
    <div class="member-shell">
      <div th:replace="${content}">Page body</div>
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script th:src="@{/js/theme.js}"></script>
<script>
  /* Reveal/hide password fields (eye toggle) */
  function togglePw(btn) {
    var input = btn.closest('.pw-group').querySelector('input');
    var icon = btn.querySelector('i');
    var show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    icon.className = show ? 'fa-solid fa-eye-slash fa-fw' : 'fa-solid fa-eye fa-fw';
  }
</script>
</body>
</html>
