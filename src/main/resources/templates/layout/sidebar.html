<div th:fragment="sidebar" class="app-sidebar">
  <div class="app-sidebar-logo">
    <i class="bi bi-hub me-2"></i>
    <span>TalentHub</span>
  </div>

  <ul class="app-sidebar-menu">
    <li>
      <a th:href="@{/}" class="app-sidebar-link" th:classappend="${activeMenu == 'dashboard' ? 'active' : ''}">
        <i class="bi bi-grid"></i>
        <span>Dashboard</span>
      </a>
    </li>
    <li>
      <a th:href="@{/manage/jobs}" class="app-sidebar-link" th:classappend="${activeMenu == 'jobs' ? 'active' : ''}">
        <i class="bi bi-briefcase"></i>
        <span>Jobs</span>
      </a>
    </li>
    <li>
      <a th:href="@{/candidates}" class="app-sidebar-link" th:classappend="${activeMenu == 'candidates' ? 'active' : ''}">
        <i class="bi bi-people"></i>
        <span>Candidates</span>
      </a>
    </li>
    <li th:if="${session.loggedInUser?.role?.name == 'ADMIN' || session.loggedInUser?.role?.name == 'HR_MANAGER'}">
      <a th:href="@{/reports/pipeline}" class="app-sidebar-link" th:classappend="${activeMenu == 'report' ? 'active' : ''}">
        <i class="bi bi-graph-up"></i>
        <span>Pipeline Report</span>
      </a>
    </li>
    <li>
      <a th:href="@{/settings}" class="app-sidebar-link" th:classappend="${activeMenu == 'settings' ? 'active' : ''}">
        <i class="bi bi-gear"></i>
        <span>Settings</span>
      </a>
    </li>
  </ul>


</div>
