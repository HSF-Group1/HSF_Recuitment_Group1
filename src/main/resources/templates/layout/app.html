<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="appLayout(title, content)">
<head>
  <!-- Anti-flash: apply saved theme before first paint (ui-skill.md §9) -->
  <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-bs-theme',t);})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title != null ? title + ' - TalentHub' : 'TalentHub'}">TalentHub</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 6 webfont — fa-solid weight only (ui-skill.md §5) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link th:href="@{/css/base/variables.css}" rel="stylesheet">
  <link th:href="@{/css/base/reset.css}" rel="stylesheet">
  <link th:href="@{/css/layout/navbar.css}" rel="stylesheet">
  <link th:href="@{/css/layout/footer.css}" rel="stylesheet">
  <link th:href="@{/css/components/button.css}" rel="stylesheet">
  <link th:href="@{/css/components/form.css}" rel="stylesheet">
  <link th:href="@{/css/components/card.css}" rel="stylesheet">
  <link th:href="@{/css/components/badge.css}" rel="stylesheet">
  <link th:href="@{/css/components/alert.css}" rel="stylesheet">
  <!-- Editorial minimalism skin (ui-skill.md) — before dark.css so §9 wins in dark -->
  <link th:href="@{/css/base/editorial.css}" rel="stylesheet">
  <link th:href="@{/css/base/dark.css}" rel="stylesheet">
  <script th:src="@{/js/theme.js}"></script>
  <style>
    .app-main-frame { min-height: 100dvh; display: flex; flex-direction: column; }
    .app-viewport-content { padding: var(--content-padding, 24px); flex: 1; }
  </style>
</head>
<body>

  <div class="app-main-frame">
    <!-- Top navigation: brand + theme toggle + username dropdown (SCR-04 entry) -->
    <div class="app-navbar">
      <a th:href="@{/}" class="app-navbar-brand"><i class="fa-solid fa-building me-2"></i>TalentHub</a>
      <div class="d-flex align-items-center gap-3">
        <button type="button" class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">
          <i class="fa-solid fa-moon" data-theme-icon></i>
        </button>
        <span th:if="${currentUser != null}" class="app-badge app-badge-info" th:text="${currentUser.roleLabel()}">Role</span>
        <a th:if="${currentUser == null}" th:href="@{/login}" class="app-btn app-btn-outline btn-sm">Sign In</a>
        <div class="dropdown" th:if="${currentUser != null}">
          <button class="btn btn-link text-decoration-none text-muted p-1 d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
            <i class="fa-solid fa-circle-user" style="font-size: 20px;"></i>
            <span class="d-none d-md-inline" style="font-size: 14px;" th:text="${currentUser.fullName}">User</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" th:href="@{/profile}"><i class="fa-solid fa-user fa-fw me-2"></i>Profile</a></li>
            <li><a class="dropdown-item" th:href="@{/profile/change-password}"><i class="fa-solid fa-key fa-fw me-2"></i>Change Password</a></li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <form th:action="@{/logout}" method="post" class="w-100">
                <button type="submit" class="dropdown-item text-danger w-100"><i class="fa-solid fa-right-from-bracket fa-fw me-2"></i>Sign Out</button>
              </form>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <main class="app-viewport-content">
      <!-- Flash / error banners -->
      <div th:if="${flash}" class="app-alert app-alert-success" role="alert">
        <i class="fa-solid fa-circle-check" style="font-size:20px;"></i><span th:text="${flash}"></span>
      </div>
      <div th:if="${error}" class="app-alert app-alert-danger" role="alert">
        <i class="fa-solid fa-triangle-exclamation" style="font-size:20px;"></i><span th:text="${error}"></span>
      </div>

      <div th:replace="${content}"></div>
    </main>

    <div class="app-footer"><div class="container-fluid"><div>&copy; 2026 TalentHub Inc.</div></div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
