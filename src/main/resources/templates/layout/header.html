<div th:fragment="header(pageTitle, pageSubtitle)" class="app-navbar">
  <!-- Left side: Hamburger (mobile) + Dynamic page titles -->
  <div class="d-flex align-items-center">
    <button type="button" class="btn btn-link text-decoration-none text-muted p-0 me-3 d-md-none" id="sidebarToggle" aria-label="Toggle sidebar">
      <i class="bi bi-list" style="font-size: 24px;"></i>
    </button>
    <div class="app-navbar-title-section">
      <h1 class="app-navbar-title mb-0" th:text="${pageTitle != null ? pageTitle : (title != null ? title : 'TalentHub')}">System Overview</h1>
      <p class="app-navbar-subtitle text-muted mb-0 d-none d-sm-block" th:text="${pageSubtitle != null ? pageSubtitle : 'Manage your recruitment and system processes.'}">Monitor platform activity and manage the system efficiently.</p>
    </div>
  </div>
  
  <!-- Right side notifications/profile dropdown actions -->
  <div class="d-flex align-items-center gap-3">
    <a th:if="${currentUser == null || currentUser.isCandidate()}" th:href="@{/jobs}" class="text-decoration-none text-muted" style="font-size: 14px; font-weight: 600;">
      View Jobs
    </a>
    <!-- Theme Toggle -->
    <button type="button" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
      <i class="fa-solid fa-moon fa-fw" data-theme-icon=""></i>
    </button>
    
    <!-- Notifications bell -->
    <div class="dropdown">
      <button class="btn btn-link text-decoration-none text-muted p-1" type="button" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-bell" style="font-size: 20px;"></i>
      </button>
      <ul class="dropdown-menu dropdown-menu-end p-2" style="min-width: 240px;">
        <li class="dropdown-header text-uppercase fw-bold text-primary">Notifications</li>
        <li><hr class="dropdown-divider"></li>
        <li>
          <a class="dropdown-item py-2" href="#">
            <div class="fw-semibold text-dark" style="font-size: 13px;">New Applicant</div>
            <small class="text-muted" style="font-size: 11px;">Nguyen Van A applied for Java Dev</small>
          </a>
        </li>
      </ul>
    </div>
    
    <!-- Profile dropdown -->
    <div class="dropdown">
      <button class="btn btn-link text-decoration-none text-muted p-1 d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-person-circle" style="font-size: 20px;"></i>
        <span class="d-none d-md-inline" style="font-size: 14px;" th:text="${currentUser.username}">Username</span>
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-gear me-2"></i>Settings</a></li>
        <li><hr class="dropdown-divider"></li>
        <li>
          <form th:action="@{/auth/logout}" method="post" class="w-100">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>
            <button type="submit" class="dropdown-item text-danger w-100"><i class="bi bi-box-arrow-right me-2"></i>Log Out</button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</div>
