<div th:fragment="internalNotes" class="app-card"
    th:if="${currentUserRole == 'ADMIN' || currentUserRole == 'HR_MANAGER'}">
    <div class="mb-3">
        <h3 class="app-card-title"><i class="bi bi-sticky-fill me-2"></i>Internal Notes</h3>
        <div class="app-card-subtitle">Private HR and Admin notes (Interviewer restricted)</div>
    </div>
    <div class="py-2">
        <!-- Notes List -->
        <div th:if="${internalNotes != null && !internalNotes.isEmpty()}" class="d-flex flex-column gap-3 mb-4">
            <div th:each="note : ${internalNotes}" class="p-3 border rounded bg-light">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="fw-bold text-dark" th:text="${note.author?.fullName ?: 'Unknown Author'}">Author Name</span>
                    <span class="small text-muted" th:text="${note.createdAt != null ? #temporals.format(note.createdAt, 'dd/MM/yyyy HH:mm') : 'N/A'}">Date & Time</span>
                </div>
                <div class="text-charcoal" style="white-space: pre-wrap;" th:text="${note.content}">Note Content</div>
            </div>
        </div>

        <div th:if="${internalNotes == null || internalNotes.isEmpty()}"
            class="text-center py-4 border rounded border-dashed mb-4 bg-light"
            style="border-style: dashed !important;">
            <div class="fs-2 text-muted mb-2"><i class="bi bi-chat-square-text"></i></div>
            <div class="text-muted">No notes recorded yet.</div>
        </div>

        <!-- Inline Note Form -->
        <div class="mt-3">
            <!-- Add Note Button (toggles form visibility) -->
            <button type="button" class="app-btn app-btn-secondary"
                    onclick="document.getElementById('note-form-container').classList.toggle('d-none'); this.classList.toggle('d-none');">
                <i class="bi bi-plus-circle me-1"></i> Add Note
            </button>

            <!-- Form container (initially hidden) -->
            <div id="note-form-container" class="d-none mt-2">
                <form th:attr="hx-post='/application/' + ${currentApplication.id} + '/notes'"
                      hx-target="#notes-panel"
                      hx-swap="outerHTML">
                    <div class="mb-3">
                        <label for="newNoteContent" class="form-label fw-semibold text-muted small">Add Internal Note</label>
                        <textarea id="newNoteContent" name="content" class="form-control" rows="3"
                            placeholder="Type internal note details here..." required></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="app-btn app-btn-primary">
                            Save Note
                        </button>
                        <button type="button" class="app-btn app-btn-secondary"
                                onclick="document.getElementById('note-form-container').classList.add('d-none'); document.querySelector('.mt-3 > button').classList.remove('d-none');">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
