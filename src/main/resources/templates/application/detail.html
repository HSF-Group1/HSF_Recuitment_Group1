<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/base :: mainLayout(title='Application Detail', activeMenu = 'dashboard', content=~{::section})}">

<body>
    <section class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="app-h1">Application Detail</h1>
            <div th:if="${currentApplication != null}">
                <a href="/application" class="app-btn app-btn-secondary text-decoration-none">
                    <i class="bi bi-x-circle me-1"></i> Exit
                </a>
            </div>
        </div>
        <div th:replace="~{fragments/breadcrumb :: appBreadcrumb(parentText='Applications', parentUrl='/application', activeText='Details')}"></div>
        
        <div th:replace="~{fragments/alert :: appAlert(message=${errorMsg}, type='danger')}"></div>

        <!-- Single wrapping container for HTMX outerHTML updates -->
        <div id="application-detail-panels" class="row g-4 mt-2" th:if="${currentApplication}">
            <!-- Left Side Column -->
            <div class="col-md-6 d-flex flex-column gap-4">
                <!-- Status Card Fragment -->
                <div th:replace="~{application/fragments/_status_card :: statusCard(${currentApplication})}"></div>
                
                <!-- CV Card Fragment -->
                <div th:replace="~{application/fragments/_cv_card :: cvCard(${currentApplication}, ${canDownloadCv})}"></div>
                
                <!-- Pipeline Actions Fragment -->
                <div th:replace="~{application/fragments/_pipeline_actions :: pipelineActions(${currentApplication}, ${allowedTransitions})}"></div>
            </div>

            <!-- Right Side Column -->
            <div class="col-md-6 d-flex flex-column gap-4">
                <!-- Candidate Info Fragment -->
                <div th:replace="~{application/fragments/_candidate_info :: candidateInfo(${currentApplication})}"></div>
                
                <!-- Activity Timeline Fragment -->
                <div th:replace="~{application/fragments/_activity_timeline :: activityTimeline(${currentApplication})}"></div>
                
                <!-- Internal Notes Fragment (Static Placeholder) -->
                <div th:replace="~{application/fragments/_internal_notes :: internalNotes}"></div>
            </div>
        </div>

        
    </section>
</body>

</html>
